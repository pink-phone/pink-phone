# Public release (manual): creates the tag, builds the images and publishes them
# to Docker Hub, then creates the GitHub release.
#
# Prérequis (Settings → Secrets and variables → Actions du dépôt GitHub) :
#   - DOCKERHUB_USERNAME : namespace Docker Hub (= nom des images <user>/pinkphone-*).
#   - DOCKERHUB_TOKEN    : access token Docker Hub (write).

name: Release & publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Tag de version à créer (ex: v0.1.0)"
        required: true

permissions:
  contents: write # créer le tag + la release

env:
  API_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/pinkphone-api
  WEB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/pinkphone-web

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Valider et calculer la version
        id: v
        run: |
          VER="${{ inputs.version }}"
          if [[ ! "$VER" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Format attendu vX.Y.Z (reçu: $VER)"; exit 1
          fi
          if git rev-parse "$VER" >/dev/null 2>&1; then
            echo "::error::Le tag $VER existe déjà"; exit 1
          fi
          echo "tag=$VER" >> "$GITHUB_OUTPUT"
          echo "version=${VER#v}" >> "$GITHUB_OUTPUT"

      - name: Créer et pousser le tag
        run: |
          git tag "${{ steps.v.outputs.tag }}"
          git push origin "${{ steps.v.outputs.tag }}"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ steps.v.outputs.version }}

      - name: Build & push Web
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ steps.v.outputs.version }}

      - name: Créer la release GitHub
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.v.outputs.tag }}" \
            --title "${{ steps.v.outputs.tag }}" \
            --generate-notes
