# Public release (manual): creates the tag, builds the images and publishes them
# to Docker Hub, then creates the GitHub release.
#
# Multi-arch SANS émulation QEMU (#72) : chaque architecture est buildée NATIVEMENT
# sur son propre runner (amd64 = ubuntu-latest, arm64 = ubuntu-24.04-arm, gratuit
# sur repo public), poussée PAR DIGEST, puis un job d'assemblage fusionne les deux
# en un manifest multi-arch. Bien plus rapide que `buildx --platform a,b` qui
# compilait l'arch non native sous QEMU (très lent, surtout la compilation Rust).
#
# Prérequis (Settings → Secrets and variables → Actions du dépôt GitHub) :
#   - DOCKERHUB_USERNAME : namespace Docker Hub (= nom des images <user>/pinkphone-*).
#   - DOCKERHUB_TOKEN    : access token Docker Hub (write).

name: Release & publish

# Deux usages : soit on remplit `version` (ex: v1.4.0) et elle fait foi, soit on
# la laisse vide et la version est calculée depuis le dernier tag selon `bump`.
# Le run-name ne peut afficher que des inputs (figé au dispatch, avant le job) :
# si `version` est vide (auto-bump), le numéro calculé apparaît dans le résumé du
# job + le titre de la release.
run-name: Release · ${{ inputs.version }} (${{ inputs.bump }})

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version exacte (ex: v1.4.0). Vide = auto depuis `bump`."
        required: false
        default: ""
      bump:
        description: "Type d'incrément si `version` est vide"
        type: choice
        options: [patch, minor, major]
        default: patch
        required: true

permissions:
  contents: write # créer le tag + la release

env:
  API_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/pinkphone-api
  WEB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/pinkphone-web

jobs:
  # 1. Valide la version. Le tag est créé À LA FIN, par l'API (gh release create
  #    --target), et non par `git push` : le GITHUB_TOKEN n'a pas la permission
  #    `workflows` et un push de ref touchant .github/workflows/ serait rejeté.
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.v.outputs.tag }}
      version: ${{ steps.v.outputs.version }}
      previous: ${{ steps.v.outputs.previous }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculer la version
        id: v
        run: |
          git fetch --tags --force
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          VER="${{ inputs.version }}"
          if [ -n "$VER" ]; then
            # Version explicite : on valide juste le format vX.Y.Z.
            if [[ ! "$VER" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Format attendu vX.Y.Z (reçu: $VER)"; exit 1
            fi
            TAG="$VER"
            FROM="(explicite)"
          else
            # Auto : incrément depuis le dernier tag selon `bump`.
            V="${LATEST#v}"; [ -z "$V" ] && V="0.0.0"
            MAJOR="${V%%.*}"; REST="${V#*.}"; MINOR="${REST%%.*}"; PATCH="${REST#*.}"
            case "${{ inputs.bump }}" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch) PATCH=$((PATCH + 1)) ;;
            esac
            TAG="v${MAJOR}.${MINOR}.${PATCH}"
            FROM="(depuis ${LATEST:-le début}, bump ${{ inputs.bump }})"
          fi
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Le tag $TAG existe déjà"; exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "previous=$LATEST" >> "$GITHUB_OUTPUT"
          echo "**$TAG** $FROM" >> "$GITHUB_STEP_SUMMARY"

  # 2. Build natif par architecture (en parallèle), push par digest.
  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Nom de plateforme sans slash (pour les artefacts)
        env:
          platform: ${{ matrix.platform }}
        run: echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push API (natif, par digest)
        id: api
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.API_IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Build & push Web (natif, par digest)
        id: web
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.WEB_IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Exporter les digests
        env:
          API_DIGEST: ${{ steps.api.outputs.digest }}
          WEB_DIGEST: ${{ steps.web.outputs.digest }}
        run: |
          mkdir -p /tmp/digests/api /tmp/digests/web
          touch "/tmp/digests/api/${API_DIGEST#sha256:}"
          touch "/tmp/digests/web/${WEB_DIGEST#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: digests-api-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/api/*
          if-no-files-found: error
          retention-days: 1

      - uses: actions/upload-artifact@v4
        with:
          name: digests-web-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/web/*
          if-no-files-found: error
          retention-days: 1

  # 3. Assemble les digests par arch en un manifest multi-arch + tags, puis release.
  merge:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      # Checkout pour les overviews Docker Hub (deploy/dockerhub-*.md).
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: /tmp/api
          pattern: digests-api-*
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          path: /tmp/web
          pattern: digests-web-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Assembler le manifest API (multi-arch)
        working-directory: /tmp/api
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          docker buildx imagetools create \
            -t "${API_IMAGE}:latest" -t "${API_IMAGE}:${VERSION}" \
            $(printf "${API_IMAGE}@sha256:%s " *)

      - name: Assembler le manifest Web (multi-arch)
        working-directory: /tmp/web
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          docker buildx imagetools create \
            -t "${WEB_IMAGE}:latest" -t "${WEB_IMAGE}:${VERSION}" \
            $(printf "${WEB_IMAGE}@sha256:%s " *)

      # Pages des repos Docker Hub (description courte + overview/README) — #82.
      # `continue-on-error` : une 401 (le token n'a pas la permission de modifier
      # la description → il faut le MOT DE PASSE du compte ou un PAT adéquat) ne
      # doit pas faire échouer la release.
      - name: Pousser la page Docker Hub (API)
        uses: peter-evans/dockerhub-description@v4
        continue-on-error: true
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.API_IMAGE }}
          short-description: "Pink Phone API — backend (Rust/Axum) for the self-hosted intimate PWA for two."
          readme-filepath: ./deploy/dockerhub-api.md

      - name: Pousser la page Docker Hub (Web)
        uses: peter-evans/dockerhub-description@v4
        continue-on-error: true
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.WEB_IMAGE }}
          short-description: "Pink Phone Web — PWA + nginx for the self-hosted intimate PWA for two."
          readme-filepath: ./deploy/dockerhub-web.md

      # Notes = liste des commits depuis le tag précédent (pas `--generate-notes`,
      # qui se base sur les PR — or ce repo n'en a pas, miroir oblige → notes
      # vides). Crée le tag (sur le commit courant) ET la release via l'API — pas
      # de `git push` (contournement de la permission `workflows` manquante).
      - name: Créer le tag + la release GitHub
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.prepare.outputs.tag }}
          PREV: ${{ needs.prepare.outputs.previous }}
          SHA: ${{ github.sha }}
        run: |
          if [ -n "$PREV" ] && gh api "repos/$REPO/compare/$PREV...$SHA" >/dev/null 2>&1; then
            NOTES=$(gh api "repos/$REPO/compare/$PREV...$SHA" \
              --jq '.commits[] | "- " + (.commit.message | split("\n")[0]) + " (" + .sha[0:7] + ")"')
            LINK="**Full Changelog**: https://github.com/$REPO/compare/$PREV...$TAG"
          else
            NOTES="- First release."
            LINK="**Full Changelog**: https://github.com/$REPO/commits/$TAG"
          fi
          [ -z "$NOTES" ] && NOTES="- (no changes listed)"
          BODY=$(printf '%s\n\n%s\n' "$NOTES" "$LINK")
          gh release create "$TAG" \
            --repo "$REPO" \
            --target "$SHA" \
            --title "$TAG" \
            --notes "$BODY"
