services:
  db:
    image: postgres:16-alpine
    container_name: pinkphone-db
    environment:
      POSTGRES_USER: pink
      POSTGRES_PASSWORD: pink
      POSTGRES_DB: pinkphone
    ports:
      - "5432:5432"
    volumes:
      - pink_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pink -d pinkphone"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pink_pgdata:
