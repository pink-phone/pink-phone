<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="36%" cy="28%" r="95%">
      <stop offset="0" stop-color="#7A2740"/>
      <stop offset="0.55" stop-color="#591B2E"/>
      <stop offset="1" stop-color="#37111E"/>
    </radialGradient>
    <linearGradient id="h" x1="0" y1="0" x2="0.25" y2="1">
      <stop offset="0" stop-color="#EAB2C2"/>
      <stop offset="0.5" stop-color="#C16A82"/>
      <stop offset="1" stop-color="#A2455C"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <g transform="rotate(-26 256 256)">
    <!-- cordon spiralé qui se rétracte : ovales empilés, de plus en plus serrés -->
    <g fill="none" stroke="url(#h)" stroke-width="8">
      <ellipse cx="360" cy="300" rx="27" ry="12"/>
      <ellipse cx="359" cy="318" rx="25" ry="11"/>
      <ellipse cx="358" cy="335" rx="22" ry="10"/>
      <ellipse cx="357" cy="350" rx="19" ry="9"/>
      <ellipse cx="356" cy="363" rx="16" ry="8"/>
      <ellipse cx="356" cy="374" rx="13" ry="7"/>
    </g>

    <!-- combiné : poignée convexe + écouteurs ovales (cônes ear/mouth) -->
    <path d="M152 278 Q256 212 360 278" fill="none" stroke="url(#h)" stroke-width="28" stroke-linecap="round"/>
    <ellipse cx="150" cy="280" rx="25" ry="44" transform="rotate(-22 150 280)" fill="url(#h)"/>
    <ellipse cx="362" cy="280" rx="25" ry="44" transform="rotate(22 362 280)" fill="url(#h)"/>
  </g>
</svg>
