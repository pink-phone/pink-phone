# Bascule l'en-tête Connection pour les handshakes WebSocket (refresh temps réel).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Log « masqué » pour le handshake WebSocket : le JWT voyage en query string
# (seule option navigateur) — on journalise méthode + chemin SANS la query, pour
# ne pas écrire le token en clair dans les logs (SEC-002).
log_format pp_ws_masked '$remote_addr - [$time_local] '
    '"$request_method $uri" $status $body_bytes_sent';

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Uploads médias jusqu'à 100 Mo (cf. DefaultBodyLimit côté API, vidéos #48).
    client_max_body_size 100m;
    # Les en-têtes de durcissement (SEC-007) sont posés sur le document HTML
    # (location /), pas au niveau server : ça permet d'y ajouter aussi un
    # Cache-Control sans le piège d'héritage `add_header` de nginx.

    # WebSocket de refresh temps réel : upgrade + timeout long (connexion idle).
    # Location regex : prioritaire sur le préfixe /api/ ci-dessous.
    location ~ ^/api/spaces/[^/]+/ws$ {
        access_log /var/log/nginx/access.log pp_ws_masked;  # masque le token (SEC-002)
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $pp_api http://api:8080;
        proxy_pass $pp_api$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    # Médias : stream direct (upload + download). On désactive le buffering nginx
    # pour ne plus écrire les images/vidéos lourdes dans un fichier temporaire et
    # laisser les octets filer vers le client au fil de l'eau (back streamé + Range).
    # Regex anchorée /media : prioritaire sur le préfixe /api/ ci-dessous.
    location ~ ^/api/spaces/[^/]+/media {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $pp_api http://api:8080;
        proxy_pass $pp_api$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
    }

    # API : reverse-proxy same-origin vers le service api du compose.
    # Résolution à l'exécution (DNS Docker) via une variable : nginx démarre même
    # si l'api est momentanément down (sinon "host not found in upstream" au boot).
    location /api/ {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $pp_api http://api:8080;
        proxy_pass $pp_api$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Assets hashés par Vite (JS/CSS/polices) : immuables → cache long. Surtout, un
    # fichier ABSENT renvoie 404 et NON le fallback index.html : sinon un vieil
    # index.html caché (après un déploiement qui a purgé l'ancien hash) demande un
    # asset disparu, reçoit du text/html, et `nosniff` casse tout
    # (« MIME 'text/html' is not a supported stylesheet »).
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Le service worker ne doit pas être mis en cache agressivement.
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }

    # PWA : fallback SPA + en-têtes de durcissement du document HTML (SEC-007).
    # On NE met PAS index.html en cache (no-cache → revalidation) pour qu'après un
    # déploiement le navigateur récupère les nouveaux hash d'assets. La CSP est en
    # mode bloquant, validée contre le build Vite réel (un seul script externe
    # `self`, aucune balise inline ; polices @fontsource self-hosted ; médias en
    # blob: ; WS en wss:). `style-src 'unsafe-inline'` est requis par les styles
    # inline React (`style={{…}}`, ex. FireEmbers). X-Frame-Options/nosniff sont
    # fournis par le reverse-proxy amont (a reverse proxy) ; en déploiement AUTONOME,
    # ajoute-les sur ton proxy (cf. deploy/README).
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob:; font-src 'self'; connect-src 'self' ws: wss:; worker-src 'self' blob:; manifest-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
    }
}
