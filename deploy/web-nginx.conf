server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Médias jusqu'à 20 Mo (cf. DefaultBodyLimit côté API).
    client_max_body_size 25m;

    # API : reverse-proxy same-origin vers le service api du compose.
    # Résolution à l'exécution (DNS Docker) via une variable : nginx démarre même
    # si l'api est momentanément down (sinon "host not found in upstream" au boot).
    location /api/ {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $pp_api http://api:8080;
        proxy_pass $pp_api$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Le service worker ne doit pas être mis en cache agressivement.
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }

    # PWA : fallback SPA.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
